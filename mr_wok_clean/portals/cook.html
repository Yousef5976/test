<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mr. Wok — Cook Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<style>
:root{
  --bg:#0a0c0f;--surface:#13161b;--surface2:#1c2028;--surface3:#252932;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#eef1f6;--muted:#7a8494;
  --accent:#3b82f6;--accent2:#60a5fa;--green:#22c55e;
  --orange:#f97316;--red:#ef4444;--gold:#f59e0b;
  --font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;}

/* LOGIN */
#login-screen{
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:radial-gradient(ellipse at 40% 40%,rgba(59,130,246,.08),transparent 60%),var(--bg);
}
.login-card{width:360px;padding:44px 36px;background:var(--surface);border:1px solid var(--border2);border-radius:20px;box-shadow:0 40px 80px rgba(0,0,0,.6);}
.login-logo{font-family:var(--font-display);font-size:26px;font-weight:800;margin-bottom:6px;}
.login-logo span{color:var(--accent);}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:28px;}
.fg{margin-bottom:16px;}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;}
.fg input{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:14px;font-family:var(--font-body);outline:none;transition:border-color .2s;}
.fg input:focus{border-color:var(--accent);}
.btn-login{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:var(--font-display);cursor:pointer;transition:all .2s;margin-top:6px;}
.btn-login:hover{background:var(--accent2);}
.login-error{color:var(--red);font-size:13px;margin-top:10px;text-align:center;display:none;}

/* APP */
#app{display:none;min-height:100vh;}

/* NAV */
nav{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;
  position:sticky;top:0;z-index:100;
}
.nav-left{display:flex;align-items:center;gap:14px;}
.nav-logo{font-family:var(--font-display);font-size:17px;font-weight:800;}
.nav-logo span{color:var(--accent);}
.user-chip{
  padding:4px 12px;background:var(--surface2);border:1px solid var(--border2);
  border-radius:20px;font-size:12px;font-weight:600;color:var(--accent);
}
.nav-right{display:flex;align-items:center;gap:10px;}
.btn-sm{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font-body);transition:all .2s;}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.lang-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}

/* CONTENT */
.content{padding:24px;max-width:1200px;margin:0 auto;}
.section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.section-title{font-family:var(--font-display);font-size:18px;font-weight:800;}
.badge-count{
  display:inline-flex;align-items:center;justify-content:center;
  width:24px;height:24px;border-radius:50%;
  background:var(--red);color:#fff;font-size:12px;font-weight:800;
  margin-left:8px;animation:bounce .5s ease;
}
@keyframes bounce{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}

/* ORDER CARDS */
.orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
.order-card{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  overflow:hidden;transition:transform .2s,border-color .2s;
}
.order-card:hover{transform:translateY(-2px);}
.order-card.urgent{border-color:rgba(239,68,68,.4);box-shadow:0 0 20px rgba(239,68,68,.1);}
.order-card.accepted{border-color:rgba(59,130,246,.4);}
.card-header{
  padding:16px 18px;display:flex;justify-content:space-between;align-items:flex-start;
  border-bottom:1px solid var(--border);
}
.order-ref{font-family:monospace;font-size:12px;font-weight:700;color:var(--gold);}
.order-time{font-size:11px;color:var(--muted);margin-top:3px;}
.order-type{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;}
.t-DELIVERY{background:rgba(239,68,68,.15);color:#f87171;}
.t-DINE_IN{background:rgba(34,197,94,.15);color:#4ade80;}
.t-TAKEAWAY{background:rgba(245,158,11,.15);color:#fbbf24;}
.card-body{padding:16px 18px;}
.customer-row{margin-bottom:12px;}
.customer-name{font-weight:700;font-size:15px;}
.customer-phone{font-size:12px;color:var(--muted);margin-top:2px;}
.items-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.item-row{
  display:flex;justify-content:space-between;align-items:center;
  background:var(--surface2);padding:8px 12px;border-radius:8px;
}
.item-name{font-size:13px;font-weight:500;}
.item-qty{
  font-size:13px;font-weight:700;font-family:monospace;
  background:var(--accent);color:#fff;padding:2px 8px;border-radius:6px;
}
.delivery-notes{
  background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);
  border-radius:8px;padding:10px 12px;font-size:12px;color:var(--gold);
  margin-bottom:14px;
}
.card-footer{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:10px;}
.btn-accept{
  flex:1;padding:11px;background:var(--accent);color:#fff;
  border:none;border-radius:10px;font-size:14px;font-weight:700;
  font-family:var(--font-display);cursor:pointer;transition:all .2s;
}
.btn-accept:hover{background:var(--accent2);}
.btn-prepared{
  flex:1;padding:11px;background:var(--green);color:#fff;
  border:none;border-radius:10px;font-size:14px;font-weight:700;
  font-family:var(--font-display);cursor:pointer;transition:all .2s;
}
.btn-prepared:hover{filter:brightness(1.1);}
.btn-prepared:disabled{opacity:.5;cursor:not-allowed;}

/* TIMER */
.timer-bar{
  height:4px;background:var(--surface3);border-radius:2px;margin-bottom:14px;
  overflow:hidden;
}
.timer-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--orange));border-radius:2px;transition:width .5s;}
.timer-label{font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between;}

/* AVAILABILITY TOGGLE */
.avail-toggle{display:flex;align-items:center;gap:10px;}
.toggle-track{
  width:46px;height:26px;border-radius:13px;cursor:pointer;
  position:relative;transition:background .25s;border:none;padding:0;
  background:rgba(239,68,68,.4);
}
.toggle-track.on{background:var(--green);}
.toggle-thumb{
  position:absolute;top:3px;left:3px;
  width:20px;height:20px;border-radius:50%;background:#fff;
  transition:transform .25s;box-shadow:0 1px 4px rgba(0,0,0,.3);
}
.toggle-track.on .toggle-thumb{transform:translateX(20px);}
.avail-label{font-size:13px;font-weight:700;}
.avail-label.online{color:var(--green);}
.avail-label.break{color:var(--orange);}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:56px;margin-bottom:12px;}
.empty-text{font-size:15px;}

/* TOAST */
#toasts{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:12px 18px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;min-width:260px;box-shadow:0 8px 24px rgba(0,0,0,.5);animation:slideIn .3s ease;}
.toast-new{border-left:3px solid var(--red);}
.toast-ok{border-left:3px solid var(--green);}
@keyframes slideIn{from{transform:translateX(100px);opacity:0;}to{transform:translateX(0);opacity:1;}}

[dir="rtl"] .card-footer{flex-direction:row-reverse;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🍜 <span>Cook</span> Portal</div>
    <div class="login-sub" id="ls-sub">Mr. Wok Kitchen — Staff Only</div>
    <div class="fg"><label id="ls-user-lbl">Username</label><input type="text" id="lu" autocomplete="username"/></div>
    <div class="fg"><label id="ls-pass-lbl">Password</label><input type="password" id="lp" autocomplete="current-password"/></div>
    <button class="btn-login" id="btn-login">Sign In</button>
    <div class="login-error" id="lerr">Invalid credentials</div>
  </div>
</div>

<div id="app">
  <nav>
    <div class="nav-left">
      <div class="nav-logo">🍜 <span>Cook</span> Portal</div>
      <div class="user-chip" id="user-chip">CCK-001</div>
    </div>
    <div class="nav-right">
      <div class="avail-toggle">
        <button class="toggle-track" id="avail-track" onclick="toggleAvailability()">
          <div class="toggle-thumb"></div>
        </button>
        <span class="avail-label online" id="avail-label">Online</span>
      </div>
      <button class="lang-btn" onclick="toggleLang()" id="lang-btn">عربي</button>
      <button class="btn-sm btn-ghost" onclick="logout()" id="btn-logout">Sign Out</button>
    </div>
  </nav>

  <div class="content">
    <!-- PENDING ORDERS -->
    <div class="section-hdr" style="margin-bottom:20px;">
      <div style="display:flex;align-items:center;">
        <span class="section-title" id="title-pending" data-i18n="new_orders">New Orders</span>
        <span class="badge-count" id="pending-count" style="display:none;">0</span>
      </div>
    </div>
    <div class="orders-grid" id="pending-grid"></div>

    <!-- MY ACCEPTED ORDERS -->
    <div class="section-hdr" style="margin-top:32px;margin-bottom:16px;">
      <span class="section-title" data-i18n="my_orders">My Active Orders</span>
    </div>
    <div class="orders-grid" id="accepted-grid"></div>
  </div>
</div>

<div id="toasts"></div>

<script>
const i18n = {
  en: { new_orders:'New Orders', my_orders:'My Active Orders', accept:'Accept Order', prepared:'Mark Prepared', no_pending:'No pending orders right now', no_active:'No active orders', notes:'Notes', sign_out:'Sign Out' },
  ar: { new_orders:'طلبات جديدة', my_orders:'طلباتي النشطة', accept:'قبول الطلب', prepared:'جاهز للتوصيل', no_pending:'لا توجد طلبات معلقة', no_active:'لا توجد طلبات نشطة', notes:'ملاحظات', sign_out:'تسجيل الخروج' }
};
let lang = 'en';
function toggleLang(){
  lang = lang==='en'?'ar':'en';
  document.documentElement.dir = lang==='ar'?'rtl':'ltr';
  document.getElementById('lang-btn').textContent = lang==='en'?'عربي':'English';
  applyLang();
}
function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if(i18n[lang][k]) el.textContent = i18n[lang][k];
  });
}

let token = localStorage.getItem('mrwok_cook_token');
let currentUser = null;
let pendingOrders = [];
let acceptedOrders = [];
let timers = {};

// LOGIN
document.getElementById('lp').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('btn-login').addEventListener('click', doLogin);

async function doLogin(){
  const username = document.getElementById('lu').value.trim();
  const password = document.getElementById('lp').value;
  if(!username||!password) return;
  try {
    const r = await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const d = await r.json();
    if(!r.ok||d.user?.role!=='cook'){ showErr('Invalid credentials or not a cook account'); return; }
    token = d.token;
    currentUser = d.user;
    localStorage.setItem('mrwok_cook_token',token);
    initApp();
  } catch { showErr('Server error'); }
}
function showErr(msg){ const e=document.getElementById('lerr'); e.textContent=msg; e.style.display='block'; }

async function logout(){
  await fetch('/api/auth/logout',{method:'POST',headers:{Authorization:'Bearer '+token}}).catch(()=>{});
  localStorage.removeItem('mrwok_cook_token');
  location.reload();
}

// INIT
async function initApp(){
  if(!currentUser){
    try {
      const r = await fetch('/api/auth/me',{headers:{Authorization:'Bearer '+token}});
      const d = await r.json();
      if(d.role!=='cook'){ localStorage.removeItem('mrwok_cook_token'); location.reload(); return; }
      currentUser = d;
    } catch { localStorage.removeItem('mrwok_cook_token'); location.reload(); return; }
  }
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-chip').textContent = currentUser.displayName||currentUser.id;
  initSocket();
  loadAvailability();
  loadOrders();
  setInterval(loadOrders, 15000);
  startTimerUpdater();
}

if(token) initApp();

// SOCKET
let socket;
function initSocket(){
  socket = io();
  socket.emit('join_cook', token);
  socket.on('new_order', order => {
    pendingOrders.unshift(order);
    renderPending();
    playNewOrderSound();
    showToast(`🆕 New order: ${order.orderRef}`,'new');
  });
  socket.on('order_taken', ({orderRef}) => {
    pendingOrders = pendingOrders.filter(o=>o.orderRef!==orderRef);
    renderPending();
  });
  socket.on('urgent_order', order => {
    showToast(`⚠️ URGENT: ${order.orderRef} needs attention!`,'new');
    playNewOrderSound();
    playNewOrderSound();
  });
}

// LOAD
async function loadOrders(){
  const [pr, ar] = await Promise.all([
    fetch('/api/cook/orders/pending',{headers:{Authorization:'Bearer '+token}}).then(r=>r.json()),
    fetch('/api/cook/orders/mine',{headers:{Authorization:'Bearer '+token}}).then(r=>r.json()),
  ]);
  pendingOrders = pr;
  acceptedOrders = ar;
  renderPending();
  renderAccepted();
}

// RENDER PENDING
function renderPending(){
  const grid = document.getElementById('pending-grid');
  const countEl = document.getElementById('pending-count');
  if(pendingOrders.length){
    countEl.textContent = pendingOrders.length;
    countEl.style.display='inline-flex';
  } else { countEl.style.display='none'; }

  if(!pendingOrders.length){
    grid.innerHTML=`<div class="empty"><div class="empty-icon">✅</div><div class="empty-text" data-i18n="no_pending">${i18n[lang].no_pending}</div></div>`;
    return;
  }
  grid.innerHTML = pendingOrders.map(o => orderCard(o,'pending')).join('');
}

// RENDER ACCEPTED
function renderAccepted(){
  const grid = document.getElementById('accepted-grid');
  if(!acceptedOrders.length){
    grid.innerHTML=`<div class="empty"><div class="empty-icon">🍳</div><div class="empty-text" data-i18n="no_active">${i18n[lang].no_active}</div></div>`;
    return;
  }
  grid.innerHTML = acceptedOrders.map(o => orderCard(o,'accepted')).join('');
  acceptedOrders.forEach(o => { if(!timers[o.orderRef]) startTimer(o.orderRef, o.prepTimerStart); });
}

function orderCard(o, type){
  const items = (o.items||[]).map(i=>`
    <div class="item-row">
      <span class="item-name">${esc(i.itemName)}</span>
      <span class="item-qty">×${i.quantity}</span>
    </div>`).join('');
  const notes = o.deliveryNotes ? `<div class="delivery-notes">📝 ${esc(o.deliveryNotes)}</div>` : '';
  const timer = type==='accepted' ? `
    <div class="timer-label"><span>⏱ Prep Time</span><span id="timer-${esc(o.orderRef)}">00:00</span></div>
    <div class="timer-bar"><div class="timer-fill" id="timerbar-${esc(o.orderRef)}" style="width:0%"></div></div>` : '';
  const btn = type==='pending'
    ? `<button class="btn-accept" onclick="acceptOrder('${esc(o.orderRef)}')">${i18n[lang].accept}</button>`
    : `<button class="btn-prepared" onclick="markPrepared('${esc(o.orderRef)}')">${i18n[lang].prepared}</button>`;

  return `
    <div class="order-card ${type==='accepted'?'accepted':''}" id="card-${esc(o.orderRef)}">
      <div class="card-header">
        <div>
          <div class="order-ref">${esc(o.orderRef)}</div>
          <div class="order-time">${new Date(o.createdAt).toLocaleTimeString('en-EG',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <span class="order-type t-${o.orderType||'DELIVERY'}">${(o.orderType||'').replace('_',' ')}</span>
      </div>
      <div class="card-body">
        <div class="customer-row">
          <div class="customer-name">${esc(o.customerName||'Customer')}</div>
          <div class="customer-phone">${esc(o.customerPhone||'')}</div>
        </div>
        ${timer}
        <div class="items-list">${items}</div>
        ${notes}
        <div style="font-size:13px;font-weight:700;">EGP ${(o.total||0).toFixed(0)}</div>
      </div>
      <div class="card-footer">${btn}</div>
    </div>`;
}

// ACTIONS
async function acceptOrder(orderRef){
  const btn = document.querySelector(`#card-${orderRef} .btn-accept`);
  if(btn){ btn.disabled=true; btn.textContent='Accepting…'; }
  const r = await fetch(`/api/cook/orders/${orderRef}/accept`,{method:'POST',headers:{Authorization:'Bearer '+token}});
  if(r.ok){
    pendingOrders = pendingOrders.filter(o=>o.orderRef!==orderRef);
    renderPending();
    await loadOrders();
    showToast(`Order ${orderRef} accepted ✓`,'ok');
  } else {
    const d = await r.json();
    showToast(d.error||'Error','new');
    if(btn){ btn.disabled=false; btn.textContent=i18n[lang].accept; }
  }
}

async function markPrepared(orderRef){
  const btn = document.querySelector(`#card-${orderRef} .btn-prepared`);
  if(btn){ btn.disabled=true; btn.textContent='Sending…'; }
  const r = await fetch(`/api/cook/orders/${orderRef}/prepared`,{method:'POST',headers:{Authorization:'Bearer '+token}});
  if(r.ok){
    clearTimerForOrder(orderRef);
    acceptedOrders = acceptedOrders.filter(o=>o.orderRef!==orderRef);
    renderAccepted();
    showToast(`Order ${orderRef} ready for delivery ✓`,'ok');
  } else {
    const d = await r.json();
    showToast(d.error||'Error','new');
    if(btn){ btn.disabled=false; btn.textContent=i18n[lang].prepared; }
  }
}

// TIMERS
function startTimer(orderRef, startTimeStr){
  if(timers[orderRef]) return;
  const start = startTimeStr ? new Date(startTimeStr).getTime() : Date.now();
  timers[orderRef] = setInterval(()=>{
    const elapsed = Math.floor((Date.now()-start)/1000);
    const m = String(Math.floor(elapsed/60)).padStart(2,'0');
    const s = String(elapsed%60).padStart(2,'0');
    const el = document.getElementById(`timer-${orderRef}`);
    const bar = document.getElementById(`timerbar-${orderRef}`);
    if(el) el.textContent=`${m}:${s}`;
    if(bar){
      const pct = Math.min((elapsed/1200)*100,100); // 20min = 100%
      bar.style.width=pct+'%';
      if(elapsed>1200) bar.style.background='var(--red)';
      else if(elapsed>900) bar.style.background='var(--orange)';
    }
  },1000);
}

function clearTimerForOrder(orderRef){
  if(timers[orderRef]){ clearInterval(timers[orderRef]); delete timers[orderRef]; }
}

function startTimerUpdater(){
  setInterval(()=>{
    acceptedOrders.forEach(o=>{
      if(!timers[o.orderRef]) startTimer(o.orderRef, o.prepTimerStart);
    });
  },5000);
}

// SOUND
let audioCtx;
function playNewOrderSound(){
  try {
    audioCtx = audioCtx || new AudioContext();
    [0,0.15,0.3].forEach((t,i)=>{
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.value = [660,880,1100][i];
      gain.gain.value=0.4;
      osc.start(audioCtx.currentTime+t);
      osc.stop(audioCtx.currentTime+t+0.12);
    });
  } catch {}
}

// TOAST
function showToast(msg, type='ok'){
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className=`toast toast-${type}`;
  t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(100px)'; t.style.transition='.3s'; setTimeout(()=>t.remove(),300); },4000);
}

let isAvailable = true;

async function loadAvailability(){
  try {
    const r = await fetch('/api/auth/availability',{headers:{Authorization:'Bearer '+token}});
    const d = await r.json();
    isAvailable = d.available;
    updateAvailUI();
  } catch {}
}

async function toggleAvailability(){
  isAvailable = !isAvailable;
  updateAvailUI();
  await fetch('/api/auth/availability',{
    method:'POST',
    headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},
    body:JSON.stringify({available:isAvailable})
  });
  showToast(isAvailable ? '🟢 You are now Online' : '🟡 You are On Break', isAvailable?'ok':'new');
}

function updateAvailUI(){
  const track = document.getElementById('avail-track');
  const label = document.getElementById('avail-label');
  if(!track||!label) return;
  if(isAvailable){
    track.classList.add('on');
    label.textContent = 'Online';
    label.className = 'avail-label online';
  } else {
    track.classList.remove('on');
    label.textContent = 'On Break';
    label.className = 'avail-label break';
  }
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
